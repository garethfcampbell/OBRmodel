<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OBR Model Analyst{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            min-height: 100vh;
        }
        .main-header {
            background: linear-gradient(120deg, #060e1f 0%, #0f2247 40%, #1a3a6e 75%, #1e4a8a 100%);
            color: white;
            padding: 1.4rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 24px rgba(6, 14, 31, 0.45);
            border-bottom: 1px solid rgba(100, 160, 255, 0.15);
        }
        .header-title {
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.04em;
            font-size: 1.6rem;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
        }
        .chat-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(10, 22, 40, 0.12);
            border: 1px solid rgba(30, 64, 128, 0.1);
            padding: 1.5rem;
            margin-bottom: 2rem;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 10px;
            max-width: 85%;
        }
        .message.user {
            background: linear-gradient(135deg, #1a3461 0%, #1e4080 100%);
            color: white;
            margin-left: auto;
            text-align: right;
            box-shadow: 0 2px 8px rgba(10, 22, 40, 0.2);
        }
        .message.assistant {
            background: linear-gradient(135deg, #eef2f9 0%, #e4ebf5 100%);
            color: #0a1628;
            margin-right: auto;
            border: 1px solid rgba(30, 64, 128, 0.08);
        }
        .sidebar {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(10, 22, 40, 0.12);
            border: 1px solid rgba(30, 64, 128, 0.1);
            border-top: 3px solid #1a3461;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .sidebar h4 {
            color: #1a3461;
        }
        .chat-input {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(10, 22, 40, 0.12);
            border: 1px solid rgba(30, 64, 128, 0.1);
            padding: 1.5rem;
            margin-top: 1rem;
        }
        .chat-input h5 {
            color: #1a3461;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 1rem;
            margin: 1rem 0;
        }
        .btn-primary, .qub-submit {
            background: linear-gradient(135deg, #1a3461 0%, #1e4080 100%) !important;
            border-color: #1a3461 !important;
            color: #fff !important;
            transition: opacity 0.2s;
        }
        .btn-primary:hover, .qub-submit:hover {
            opacity: 0.88;
        }
        .btn-success {
            background: linear-gradient(135deg, #1a3461 0%, #1e5c6e 100%) !important;
            border-color: #1a3461 !important;
            color: #fff !important;
        }
        .btn-success:hover {
            opacity: 0.88;
        }
        .btn-outline-secondary {
            border-color: #1a3461 !important;
            color: #1a3461 !important;
            background: #ffffff !important;
            transition: background 0.2s, color 0.2s;
        }
        .btn-outline-secondary:hover {
            background: linear-gradient(135deg, #1a3461 0%, #1e4080 100%) !important;
            color: #fff !important;
        }
        .example-scenarios h5 {
            color: #1a3461;
            font-weight: 600;
            margin-top: 0.5rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid rgba(26, 52, 97, 0.15);
        }
        .example-scenarios h5:first-child {
            margin-top: 0;
        }
        .spinner-border {
            color: #1a3461;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1 class="header-title">OBR Model Analyst</h1>
        </div>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script>
        // Conditional MathJax loader
        let mathJaxLoaded = false;
        function loadMathJax() {
            if (mathJaxLoaded) return;
            mathJaxLoaded = true;
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";
            document.head.appendChild(script);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
